# Automate the Markdown to PDF conversion & deployment
name: Build PDF & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate PDFs

      - name: Install Pandoc & wkhtmltopdf
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc wkhtmltopdf xvfb

      - name: Generate CV PDF (English)
        run: |
          mkdir -p docs/pdf
          pandoc docs/index.md \
            --pdf-engine=wkhtmltopdf \
            --pdf-engine-opt="--enable-local-file-access" \
            --css docs/style.css \
            -o docs/pdf/cv-en.pdf

      - name: Generate CV PDF (French)
        run: |
          pandoc docs/index-fr.md \
            --pdf-engine=wkhtmltopdf \
            --pdf-engine-opt="--enable-local-file-access" \
            --css docs/style.css \
            -o docs/pdf/cv-fr.pdf

      - name: Commit & push PDFs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/pdf/cv-en.pdf docs/pdf/cv-fr.pdf
          git diff --cached --quiet || git commit -m "chore: regenerate CV PDFs [skip ci]"
          git push

      # Deploy GitHub Pages

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
